<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="1180" height="610">
  <rect width="1180" height="610" fill="#0a0a0a"/>

  <!-- Glitch Effect – Main Name -->
  <g font-family="Impact, sans-serif" font-size="180" font-weight="900">
    <text x="590" y="360" text-anchor="middle" fill="#ff003c">
      Sudhir Singh
      <animate attributeName="x" values="590;586;594;590" dur=".3s" repeatCount="indefinite"/>
    </text>
    <text x="590" y="360" text-anchor="middle" fill="#00ffff" opacity=".7">
      Sudhir Singh
      <animate attributeName="x" values="590;594;586;590" dur=".3s" repeatCount="indefinite"/>
    </text>
    <text x="590" y="360" text-anchor="middle" fill="#fff">Sudhir Singh</text>
  </g>

  <!-- Animated Neon Lines -->
  <g fill="#00ffff" opacity=".7">
    <rect x="100" y="120" width="200" height="4">
      <animate attributeName="x" values="100;800;100" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="500" y="480" width="300" height="3">
      <animate attributeName="x" values="500;200;500" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="800" y="200" width="150" height="2">
      <animate attributeName="x" values="800;400;800" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="300" y="280" width="80" height="2">
      <animate attributeName="x" values="300;700;300" dur="2.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- SYS Header -->
  <text x="60" y="80" font-family="monospace" font-size="14" fill="#ff003c">
    SYS://PROFILE_SudhirDevOps1
  </text>
  <text x="60" y="100" font-family="monospace" font-size="11" fill="#888">
    STATUS: ACTIVE · 2026
  </text>

  <!-- Role & Slogan -->
  <text x="60" y="560" font-family="monospace" font-size="14" fill="#00ffff">
    &gt; Full-Stack Developer
  </text>
  <text x="60" y="580" font-family="monospace" font-size="14" fill="#00ffff">
    &gt; DevOps Enthusiast · 3D &amp; Game Designer
  </text>
  <text x="60" y="600" font-family="monospace" font-size="12" fill="#888">
    glitch.exe · v2026 · 0x00FF
  </text>

  <!-- Right Panel - Profile Stats -->
  <g stroke="#fff" fill="none">
    <!-- Stats Card -->
    <rect x="900" y="50" width="220" height="150" rx="4"/>
    <text x="1010" y="78" font-family="monospace" font-size="12" fill="#00ffff" text-anchor="middle">
      📊 PROFILE STATS
    </text>
    <line x1="910" y1="88" x2="1110" y2="88" stroke="#333" stroke-width="1"/>

    <!-- Repositories -->
    <text x="920" y="110" font-family="monospace" font-size="11" fill="#888">
      Repositories
    </text>
    <text x="1100" y="110" font-family="monospace" font-size="11" fill="#fff" text-anchor="end">
      80+
    </text>

    <!-- Followers -->
    <text x="920" y="130" font-family="monospace" font-size="11" fill="#888">
      Followers
    </text>
    <text x="1100" y="130" font-family="monospace" font-size="11" fill="#fff" text-anchor="end">
      10
    </text>

    <!-- Stars -->
    <text x="920" y="150" font-family="monospace" font-size="11" fill="#888">
      Stars Earned
    </text>
    <text x="1100" y="150" font-family="monospace" font-size="11" fill="#fff" text-anchor="end">
      42
    </text>

    <!-- Tech Stack Badge -->
    <rect x="910" y="165" width="200" height="20" rx="4" fill="#1a1a2e" stroke="#333"/>
    <text x="1010" y="179" font-family="monospace" font-size="9" fill="#00ffff" text-anchor="middle">
      🔧 React · TS · Cloudflare · Rust · Python
    </text>
  </g>

  <!-- Bottom - Activity Indicator -->
  <g>
    <circle cx="1120" cy="580" r="4" fill="#00ffff">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="1130" y="584" font-family="monospace" font-size="10" fill="#888">
      ACTIVE
    </text>
  </g>

  <!-- Left Decorative - "Build. Secure. Deploy." -->
  <text x="60" y="530" font-family="monospace" font-size="16" fill="#ff003c" opacity=".6">
    Build. Secure. Deploy.
  </text>

  <!-- Glitch Lines - Random Flashes -->
  <rect x="0" y="200" width="1180" height="2" fill="#ff003c" opacity=".4">
    <animate attributeName="opacity" values="0;0.6;0" dur="1.4s" repeatCount="indefinite" begin="0.5s"/>
  </rect>
  <rect x="0" y="400" width="1180" height="1" fill="#00ffff" opacity=".3">
    <animate attributeName="opacity" values="0;0.5;0" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
  </rect>
</svg>
